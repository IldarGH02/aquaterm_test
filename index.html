
<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акватерм — Инженерно-сервисный центр</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --aquaterm-blue: #1a224f;
            --aquaterm-red: #d71e1e;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Roboto', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
        }
        .bg-aquaterm-blue { background-color: var(--aquaterm-blue); }
        .text-aquaterm-blue { color: var(--aquaterm-blue); }
        .bg-aquaterm-red { background-color: var(--aquaterm-red); }
        .text-aquaterm-red { color: var(--aquaterm-red); }
        .border-aquaterm-blue { border-color: var(--aquaterm-blue); }
        .border-aquaterm-red { border-color: var(--aquaterm-red); }
        
        .logo-font {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-style: italic;
        }
        
        .animate-spin-slow {
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
